services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file: .env
    environment:
      DATABASE_URL: sqlite:///./data/polymarket.db
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m backend.scanner
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file: .env
    environment:
      DATABASE_URL: sqlite:///./data/polymarket.db
    depends_on:
      - api
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data:
